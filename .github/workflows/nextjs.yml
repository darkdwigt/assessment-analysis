name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install dependencies
        run: npm install
        
      - name: Auto-generate Next.js Config
        # This guarantees the 'out' folder is created and the base path is perfectly matched to your repo!
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "module.exports = { output: 'export', basePath: '/'$REPO_NAME, eslint: { ignoreDuringBuilds: true } };" > next.config.js
          echo "Generated next.config.js for repository: $REPO_NAME"
          
      - name: Build with Next.js
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
